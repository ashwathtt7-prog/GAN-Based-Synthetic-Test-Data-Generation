# GAN-Based Synthetic Data Generation System — Configuration
# All settings are configurable — change provider/model without touching code

# === LLM Configuration ===
llm:
  provider: "gemini"                    # options: gemini, ollama
  model: "gemini-2.5-flash"  # Gemini 2.5 Flash (GA)
  ollama_base_url: "http://localhost:11434"  # used if provider=ollama
  ollama_model: "gemma3:4b"             # local model for production
  temperature: 0.1                      # low temp for deterministic output
  max_tokens: 4096                      # max output tokens
  structured_output: true               # enforce JSON schema on every call
  retry_max: 3                          # max retries on validation failure
  confidence_threshold: 0.6             # below this → human review queue
  service_account_path: "../service-account.json"

# === Database Configuration ===
database:
  # SQLite for POC (swap to PostgreSQL by changing this URL)
  # PostgreSQL: "postgresql+asyncpg://user:pass@localhost:5432/synthetic_data"
  url: "sqlite:///./synthetic_data.db"
  echo: false                           # set true for SQL debug logging

# === Neo4j Configuration ===
neo4j:
  uri: "bolt://localhost:7687"
  username: "neo4j"
  password: "synthetic_data_poc"
  database: "neo4j"

# === Data Source Configuration ===
# Three telecom-style sources sitting on three different backends so the
# demo can prove that the rule-based pipeline is backend-agnostic.
#   1. SQLite OLTP           -> datasets/telecom_source.db
#   2. DuckDB warehouse      -> datasets/telecom_dw.duckdb
#   3. DuckDB parquet lake   -> datasets/telecom_lake.duckdb (views over Parquet)
# Plus a tiny retail demo DB for the mini live demo.
data_sources:
  - name: "telecom_sqlite"
    label: "Telecom OLTP (SQLite)"
    description: "22-table telecom schema served from a SQLite OLTP file."
    default: true
    type: "sqlite"
    connection_string: "sqlite:///./datasets/telecom_source.db"
    dialect: "sqlite"
    backend: "SQLite file (row store, OLTP)"

  - name: "telecom_duckdb_dw"
    label: "Telecom Warehouse (DuckDB)"
    description: "Same 22-table telecom schema loaded into a DuckDB analytical warehouse file."
    type: "duckdb"
    connection_string: "duckdb:///./datasets/telecom_dw.duckdb"
    dialect: "duckdb"
    backend: "DuckDB file (columnar OLAP warehouse)"

  - name: "telecom_parquet_lake"
    label: "Telecom Parquet Lake (DuckDB)"
    description: "22 telecom tables exposed as DuckDB tables backed by Parquet files on disk."
    type: "duckdb"
    connection_string: "duckdb:///./datasets/telecom_lake.duckdb"
    dialect: "duckdb"
    backend: "Parquet files served through DuckDB (data-lake / lakehouse pattern)"

  - name: "demo_showcase"
    label: "Retail Mini Demo"
    description: "4-table retail relational demo with customers, products, orders, and order items."
    type: "sqlite"
    connection_string: "sqlite:///./datasets/demo_showcase.db"
    dialect: "sqlite"
    backend: "SQLite file (row store, small demo)"

# === Schema Ingestion ===
ingestion:
  sample_rows: 100                      # rows to sample for statistical profiling
  ddl_directory: "datasets/ddl"         # directory containing DDL files
  query_log_directory: "datasets/query_logs"
  statistical_profile: true             # compute per-column statistics

# === PII Detection ===
presidio:
  spacy_model: "en_core_web_lg"
  confidence_threshold: 0.7             # below this → send to LLM
  enabled_recognizers:
    - PERSON
    - EMAIL_ADDRESS
    - PHONE_NUMBER
    - CREDIT_CARD
    - IBAN_CODE
    - IP_ADDRESS
    - NRP
    - LOCATION
    - DATE_TIME
    - MEDICAL_LICENSE
    - URL
  custom_recognizers:
    - SUBSCRIBER_ID
    - IMSI
    - NETWORK_ELEMENT_ID
    - INTERNAL_ACCOUNT_CODE

# === Generation Configuration ===
generation:
  ctgan_epochs: 300                     # training epochs for CTGAN
  tvae_epochs: 300                      # training epochs for TVAE
  row_count_thresholds:
    ctgan_min: 2000                     # >= this → CTGAN
    tvae_min: 200                       # >= this and < ctgan_min → TVAE
    # < tvae_min → rule_based
  model_save_dir: "models/trained"
  edge_case_default_pct: 0.05          # 5% edge case injection default
  faker_locale: "en_US"                 # Faker locale for masking

# === Validation Thresholds ===
validation:
  ks_test_alpha: 0.05                   # KS test significance level
  jsd_threshold: 0.15                   # Jensen-Shannon Divergence max
  reid_risk_threshold: 0.85             # re-identification risk score max
  max_retry_on_failure: 3               # max re-generation attempts

# === Delivery ===
delivery:
  output_format: "parquet"              # parquet or csv
  output_directory: "output/synthetic"
  compress: true                        # gzip compression for delivery

# === Pipeline ===
pipeline:
  human_review_mode: "wait"             # "wait" or "skip" — keep minimal blocking review before generation
  resume_on_crash: true                 # resume from last completed domain
  domain_generation_order: "dependency" # "dependency" or "alphabetical"
  intelligence_parallel_workers: 4      # concurrent column analyses per table during intelligence

